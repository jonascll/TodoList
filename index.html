<!DOCTYPE html>
<html>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
  rel="stylesheet">

<head>
  <link rel="stylesheet" href="index.css">
  <meta charset="UTF-8" />

  <title>TO DO</title>
</head>

<body>
  <div id="page">
    <div class="titleMenu">
      <div class="settingsButton">
        <img name="gear-wide" id="gearIcon" class="gearIcon" src="./Resources/gear-wide.svg"></img>
      </div>
      <div>

      </div>
      <div class="menu">
        <img name="titlebutton-minimize" id="minimizeIcon" class="icon" src="./Resources/titlebutton-minimize.svg"></img>
        <img name="titlebutton-maximize" id="maximizeIcon" class="icon" src="./Resources/titlebutton-maximize.svg"></img>
        <img name="titlebutton-close" id="closeIcon" class="icon" src="./Resources/titlebutton-close.svg"></img>
      </div>
    </div>
    <p id="debugText"></p>
    <h1 class="header">TO DO</h1>
    <div id="listOfTodo" class="listOfTodo">
      
  
      <div id="inputForm" class="inputForm">
        <div>
          <label>Task name</label>
          <input id="taskName" class="formItem" type="text" placeholder="Task name"></input>
        </div>
      
        <div>
          <label>Due by</label>
          <input id="dueDateTime" class="formItem" type="datetime-local"></input>
        </div>
        
        
        
        <img name="add" id="addButton" src="./Resources/add.svg"></img>
        
      </div>
      
    </div>


  </div>
</body>
<script src="./Todo.js"></script>
<script src="./renderer.js"></script>

</html>
